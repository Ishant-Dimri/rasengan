<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ultimate Jutsu Simulator 🌀⚡</title>

  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils@0.3/drawing_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4/hands.js" crossorigin="anonymous"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --blue-mid:    #00c8ff;
      --lightning:   #e0f2ff;
      --bg:          #020408;
    }

    body {
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      font-family: 'Rajdhani', sans-serif;
      color: #cce9ff;
    }

    /* Animated background ambient glow */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at 50% 50%, rgba(0, 40, 80, 0.4) 0%, transparent 70%);
      pointer-events: none;
      transition: background 0.2s ease;
    }
    body.chidori-mode::before {
      background: radial-gradient(circle at 50% 50%, rgba(40, 80, 120, 0.5) 0%, transparent 70%);
    }

    header {
      text-align: center;
      margin-bottom: 20px;
      position: relative;
      z-index: 5;
    }
    
    header h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2.5rem, 5vw, 4rem);
      letter-spacing: 8px;
      background: linear-gradient(135deg, #ffffff 30%, var(--blue-mid) 70%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 0 20px rgba(0,200,255,0.8));
      transition: 0.3s;
    }

    header p {
      font-size: 1.2rem;
      font-weight: 600;
      letter-spacing: 3px;
      color: #99c2ff;
      margin-top: 5px;
    }

    body.chidori-mode header h1 {
      background: linear-gradient(135deg, #ffffff 30%, var(--lightning) 70%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 0 25px rgba(200,230,255,0.9));
    }

    /* Start Button Overlay */
    #start-screen {
      position: fixed;
      inset: 0;
      background: rgba(2, 4, 8, 0.98);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 50;
      transition: opacity 0.5s;
    }
    
    .btn {
      padding: 18px 45px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.8rem;
      letter-spacing: 5px;
      color: #fff;
      background: rgba(0, 0, 0, 0.5);
      border: 2px solid var(--blue-mid);
      border-radius: 8px;
      cursor: pointer;
      box-shadow: 0 0 25px rgba(0, 200, 255, 0.4);
      transition: 0.3s;
    }
    .btn:hover {
      background: rgba(0, 200, 255, 0.3);
      box-shadow: 0 0 40px rgba(0, 200, 255, 0.8);
      transform: scale(1.05);
    }

    #container {
      position: relative;
      width: min(720px, 95vw);
      aspect-ratio: 4 / 3;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 0 60px rgba(0,150,255,0.3);
      transition: 0.2s;
      border: 1px solid rgba(0, 200, 255, 0.2);
    }
    body.chidori-mode #container {
      box-shadow: 0 0 70px rgba(200,230,255,0.4);
      border-color: rgba(200, 230, 255, 0.3);
    }

    video, #output_canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      transform: scaleX(-1);
    }
    video { object-fit: cover; }

    #loading-overlay {
      position: absolute;
      inset: 0;
      background: rgba(2, 4, 8, 0.95);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 30;
      gap: 20px;
      transition: opacity 0.5s;
    }
    .spinner-ring {
      width: 70px; height: 70px;
      border-radius: 50%;
      border: 4px solid transparent;
      border-top-color: var(--blue-mid);
      animation: spin 0.8s cubic-bezier(0.6, 0.2, 0.4, 0.8) infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #status-container {
      margin-top: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    #status-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 3px;
      color: rgba(140, 200, 240, 0.7);
    }
    #dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: rgba(0,200,255,0.3);
    }
    #dot.active {
      background: var(--blue-mid);
      box-shadow: 0 0 15px rgba(0, 200, 255, 0.8), 0 0 5px #fff;
    }
    body.chidori-mode #dot.active {
      background: var(--lightning);
      box-shadow: 0 0 15px rgba(200, 230, 255, 0.8), 0 0 5px #fff;
    }
    
    #debug-ratio {
      font-family: monospace;
      font-size: 0.9rem;
      color: rgba(255,255,255,0.4);
      background: rgba(0,0,0,0.5);
      padding: 4px 10px;
      border-radius: 4px;
    }
  </style>
</head>
<body>

  <div id="start-screen">
    <button id="start-btn" class="btn">INITIALIZE CHAKRA</button>
  </div>

  <header>
    <h1 id="main-title">🌀 Rasengan Simulator</h1>
    <p>✋ Hand Open Wide = Rasengan &nbsp;|&nbsp; ✊ Fingers Tight = Chidori</p>
  </header>

  <div id="container">
    <div id="loading-overlay">
      <div class="spinner-ring"></div>
      <span style="font-family: 'Bebas Neue'; letter-spacing: 5px; font-size: 1.2rem;">CALIBRATING...</span>
    </div>
    <video id="webcam" autoplay playsinline muted></video>
    <canvas id="output_canvas"></canvas>
  </div>

  <div id="status-container">
    <div id="status-bar">
      <div id="dot"></div>
      <span id="status-text">Waiting for hand...</span>
    </div>
    <div id="debug-ratio">Spread Ratio: 0.00 (Calibration)</div>
  </div>

  <script>
  (() => {
    const video = document.getElementById('webcam');
    const canvas = document.getElementById('output_canvas');
    const ctx = canvas.getContext('2d');
    const overlay = document.getElementById('loading-overlay');
    const dot = document.getElementById('dot');
    const statusText = document.getElementById('status-text');
    const debugRatio = document.getElementById('debug-ratio');
    const startScreen = document.getElementById('start-screen');
    const startBtn = document.getElementById('start-btn');
    const mainTitle = document.getElementById('main-title');

    let time = 0; // Universal time for animations
    let jutsuAlpha = 0;
    let targetAlpha = 0;
    let lastX = 0, lastY = 0, lastR = 80;
    let currentJutsu = 'rasengan'; 

    // Audio Variables
    let rasenganSound, chidoriSound;

    // --- MATH HELPERS ---
    // Uses Math.hypot for clean 3D distance calculation
    function dist3D(a, b) { 
      return Math.hypot(a.x - b.x, a.y - b.y, a.z - b.z); 
    }
    function lerp(a, b, t) { return a + (b - a) * t; }

    // --- GRAPHICS: UPGRADED RASENGAN ---
    function drawRasengan(cx, cy, radius, alpha) {
      ctx.save();
      ctx.globalCompositeOperation = 'screen';
      
      // 1. Outer Glow Aura
      ctx.shadowColor = 'rgba(0, 150, 255, 1)';
      ctx.shadowBlur = radius * 0.8;
      
      // 2. Dense Core (White to deep blue)
      const core = ctx.createRadialGradient(cx, cy, 0, cx, cy, radius);
      core.addColorStop(0, `rgba(255, 255, 255, ${alpha})`);
      core.addColorStop(0.2, `rgba(180, 240, 255, ${0.9 * alpha})`);
      core.addColorStop(0.6, `rgba(0, 120, 255, ${0.5 * alpha})`);
      core.addColorStop(1, 'rgba(0, 50, 150, 0)');
      
      ctx.fillStyle = core;
      ctx.beginPath(); 
      ctx.arc(cx, cy, radius * 1.5, 0, Math.PI * 2); 
      ctx.fill();

      // 3. High-Speed Spinning Chakra Rings
      ctx.lineWidth = 3;
      ctx.shadowBlur = 10;
      
      // Create 4 rings rotating on different axes at different speeds
      const rings = [
        { rx: 1.0, ry: 0.3, angle: time * 0.15, tilt: 0 },
        { rx: 0.9, ry: 0.4, angle: -time * 0.2, tilt: Math.PI / 3 },
        { rx: 0.85, ry: 0.25, angle: time * 0.25, tilt: -Math.PI / 4 },
        { rx: 0.95, ry: 0.35, angle: -time * 0.18, tilt: Math.PI / 2 }
      ];

      ctx.translate(cx, cy);
      for (let r of rings) {
        ctx.save();
        ctx.rotate(r.tilt); // Tilt the 3D plane
        ctx.rotate(r.angle); // Spin along the plane
        
        ctx.strokeStyle = `rgba(150, 230, 255, ${0.8 * alpha})`;
        ctx.beginPath(); 
        // Draw ellipse to simulate 3D perspective ring
        ctx.ellipse(0, 0, radius * r.rx, radius * r.ry, 0, 0, Math.PI * 2); 
        ctx.stroke();
        ctx.restore();
      }
      ctx.translate(-cx, -cy);

      ctx.restore();
    }

    // --- GRAPHICS: UPGRADED CHIDORI ---
    function drawChidori(cx, cy, radius, alpha) {
      ctx.save();
      ctx.globalCompositeOperation = 'screen';

      // 1. Blinding Strobe Core (Flickers heavily)
      const strobe = 0.7 + Math.random() * 0.3; // Rapid flickering
      const currentAlpha = alpha * strobe;

      ctx.shadowColor = 'rgba(180, 230, 255, 1)';
      ctx.shadowBlur = 40;

      const core = ctx.createRadialGradient(cx, cy, 0, cx, cy, radius * 0.8);
      core.addColorStop(0, `rgba(255, 255, 255, ${currentAlpha})`);
      core.addColorStop(0.4, `rgba(100, 200, 255, ${0.8 * currentAlpha})`);
      core.addColorStop(1, 'rgba(0, 50, 150, 0)');
      
      ctx.fillStyle = core;
      ctx.beginPath(); 
      ctx.arc(cx, cy, radius * 0.8, 0, Math.PI * 2); 
      ctx.fill();

      // 2. Fractal Lightning Bolts
      const numBolts = Math.floor(Math.random() * 5) + 6; // 6 to 10 main bolts
      ctx.lineCap = 'round';
      ctx.lineJoin = 'miter';

      for (let i = 0; i < numBolts; i++) {
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        
        let angle = Math.random() * Math.PI * 2; // Random direction
        let currentX = cx;
        let currentY = cy;
        let boltLength = radius * (1.5 + Math.random() * 2.5); // How far it shoots out
        let segments = 5 + Math.floor(Math.random() * 6); // Jaggedness
        let segmentLength = boltLength / segments;

        ctx.lineWidth = 2 + Math.random() * 4;

        for (let j = 0; j < segments; j++) {
          // Sharp, chaotic zig-zag angles
          let offsetAngle = angle + (Math.random() - 0.5) * 2.0; 
          currentX += Math.cos(offsetAngle) * segmentLength;
          currentY += Math.sin(offsetAngle) * segmentLength;
          ctx.lineTo(currentX, currentY);

          // Small chance to draw a tiny "branch" lightning off the main bolt
          if (Math.random() > 0.7) {
            let bx = currentX + Math.cos(offsetAngle + 1) * (segmentLength * 0.5);
            let by = currentY + Math.sin(offsetAngle + 1) * (segmentLength * 0.5);
            ctx.moveTo(currentX, currentY);
            ctx.lineTo(bx, by);
            ctx.moveTo(currentX, currentY); // return to main path
          }
        }
        
        ctx.strokeStyle = Math.random() > 0.5 ? `rgba(255,255,255,${alpha})` : `rgba(150,220,255,${alpha})`;
        ctx.stroke();
      }

      ctx.restore();
    }

    // --- AI HAND DETECTION LOGIC ---
    function onResults(results) {
      time++; // Increment animation clock
      
      const W = canvas.width;
      const H = canvas.height;
      ctx.clearRect(0, 0, W, H);

      if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
        const lm = results.multiHandLandmarks[0];
        
        // --- NEW DISTANCE MEASUREMENT ---
        // 1. Palm Size (Wrist to Middle Finger Knuckle) - Used as a baseline scale
        const palmSize = dist3D(lm[0], lm[9]);

        // 2. Spread Width (Thumb tip to Pinky tip) - Measures how "open" the hand is
        const spreadWidth = dist3D(lm[4], lm[20]);

        // 3. The Magic Ratio: Width divided by Palm Size.
        // This math works no matter how close or far you are from the camera!
        const ratio = spreadWidth / palmSize;
        
        // Update debug text so the user can see what's happening
        debugRatio.textContent = `Spread Ratio: ${ratio.toFixed(2)}`;

        // --- JUTSU SWITCHING LOGIC ---
        // If ratio is > 1.6, fingers are spread wide (Holding Rasengan)
        // If ratio is < 1.2, fingers are squeezed together (Chidori Thrust)
        // (Between 1.2 and 1.6, we do nothing to prevent it flickering back and forth rapidly)
        if (ratio > 1.6 && currentJutsu !== 'rasengan') {
          currentJutsu = 'rasengan';
          document.body.classList.remove('chidori-mode');
          mainTitle.textContent = '🌀 Rasengan Active';
        } else if (ratio < 1.2 && currentJutsu !== 'chidori') {
          currentJutsu = 'chidori';
          document.body.classList.add('chidori-mode');
          mainTitle.textContent = '⚡ Chidori Active';
        }

        // --- DRAWING LOGIC ---
        // Only show if hand is relatively visible on screen
        if (palmSize > 0.04) {
          targetAlpha = 1;
          
          // Track the center of the palm smoothly
          lastX = lerp(lastX, ((lm[9].x + lm[0].x) / 2) * W, 0.4);
          lastY = lerp(lastY, ((lm[9].y + lm[0].y) / 2) * H, 0.4);
          
          // Scale visually based on hand distance (closer = bigger)
          lastR = lerp(lastR, palmSize * W * 1.8, 0.3);

          dot.classList.add('active');
          statusText.classList.add('active');
          statusText.textContent = currentJutsu === 'rasengan' ? 'RASENGAN 🌀' : 'CHIDORI ⚡';
        } else {
          targetAlpha = 0;
          dot.classList.remove('active');
          statusText.classList.remove('active');
          statusText.textContent = 'Hand too far away ✋';
        }
      } else {
        targetAlpha = 0;
        dot.classList.remove('active');
        statusText.classList.remove('active');
        statusText.textContent = 'Waiting for hand...';
        debugRatio.textContent = `Spread Ratio: --`;
      }

      // Smooth fade in/out
      jutsuAlpha += (targetAlpha - jutsuAlpha) * 0.15;

      // --- AUDIO CONTROL ---
      const activeVolume = Math.min(Math.max(jutsuAlpha, 0), 1);
      if (currentJutsu === 'rasengan' && rasenganSound) {
        rasenganSound.volume = activeVolume;
        if (chidoriSound) chidoriSound.volume = 0;
      } else if (currentJutsu === 'chidori' && chidoriSound) {
        chidoriSound.volume = activeVolume;
        if (rasenganSound) rasenganSound.volume = 0;
      }

      // --- RENDER ---
      if (jutsuAlpha > 0.01) {
        if (currentJutsu === 'rasengan') {
          drawRasengan(lastX, lastY, lastR, jutsuAlpha);
        } else {
          drawChidori(lastX, lastY, lastR, jutsuAlpha);
        }
      }
    }

    // --- MAIN INIT ---
    startBtn.addEventListener('click', () => {
      startScreen.style.opacity = '0';
      setTimeout(() => startScreen.style.display = 'none', 500);

      // Setup Canvas Native Size to prevent stretching
      const W = 640; 
      const H = 480;
      canvas.width = W; 
      canvas.height = H;

      // Load both audio files
      rasenganSound = new Audio('./rasengan.mp3'); 
      rasenganSound.loop = true; 
      rasenganSound.volume = 0;  
      rasenganSound.play().catch(e => console.log("Audio prep failed"));

      chidoriSound = new Audio('./chidori.mp3'); 
      chidoriSound.loop = true; 
      chidoriSound.volume = 0;  
      chidoriSound.play().catch(e => console.log("Audio prep failed"));
      
      // Init AI
      const hands = new Hands({ locateFile: file => `https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4/${file}` });
      hands.setOptions({ 
        maxNumHands: 1, 
        modelComplexity: 1, 
        minDetectionConfidence: 0.65, 
        minTrackingConfidence: 0.65 
      });
      hands.onResults(onResults);

      const camera = new Camera(video, { 
        onFrame: async () => { await hands.send({ image: video }); }, 
        width: W, 
        height: H 
      });
      
      camera.start()
        .then(() => {
          overlay.style.opacity = '0';
          setTimeout(() => overlay.style.display = 'none', 600);
        })
        .catch(err => alert('Camera error: ' + err.message));
    });

  })();
  </script>
</body>
</html>
