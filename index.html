<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jutsu Simulator 🌀⚡</title>

  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils@0.3/drawing_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4/hands.js" crossorigin="anonymous"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;600&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --blue-mid:    #00c8ff;
      --lightning:   #bfe2ff;
      --bg:          #04080f;
    }

    body {
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      font-family: 'Rajdhani', sans-serif;
      color: #cce9ff;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 30%, rgba(0, 60, 120, 0.35) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 70%, rgba(0, 30, 80, 0.3) 0%, transparent 55%);
      pointer-events: none;
    }

    header {
      text-align: center;
      margin-bottom: 18px;
      position: relative;
      z-index: 5;
    }
    
    header h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2rem, 5vw, 3.2rem);
      letter-spacing: 8px;
      background: linear-gradient(135deg, #ffffff 30%, var(--blue-mid) 70%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 0 18px rgba(0,200,255,0.7));
      transition: 0.3s;
    }

    header p {
      font-size: 1.1rem;
      letter-spacing: 2px;
      color: #99c2ff;
      margin-top: 5px;
    }

    body.chidori-mode header h1 {
      background: linear-gradient(135deg, #ffffff 30%, var(--lightning) 70%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 0 18px rgba(200,230,255,0.7));
    }
    body.chidori-mode header p { color: #d4ebff; }

    /* Start Button Overlay */
    #start-screen {
      position: fixed;
      inset: 0;
      background: rgba(4, 8, 15, 0.95);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 50;
      transition: opacity 0.5s;
    }
    
    .btn {
      padding: 15px 40px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.5rem;
      letter-spacing: 4px;
      color: #fff;
      background: rgba(0, 0, 0, 0.5);
      border: 2px solid var(--blue-mid);
      border-radius: 8px;
      cursor: pointer;
      box-shadow: 0 0 20px rgba(0, 200, 255, 0.3);
      transition: 0.3s;
    }
    .btn:hover {
      background: rgba(0, 200, 255, 0.2);
      box-shadow: 0 0 30px rgba(0, 200, 255, 0.6);
    }

    #container {
      position: relative;
      width: min(640px, 98vw);
      aspect-ratio: 4 / 3;
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 0 50px rgba(0,130,255,0.25);
      transition: 0.3s;
    }
    body.chidori-mode #container {
      box-shadow: 0 0 50px rgba(180,220,255,0.3);
    }

    video, #output_canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      transform: scaleX(-1);
    }
    video { object-fit: cover; }

    #loading-overlay {
      position: absolute;
      inset: 0;
      background: rgba(4, 8, 15, 0.92);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 30;
      gap: 20px;
      transition: opacity 0.5s;
    }
    .spinner-ring {
      width: 60px; height: 60px;
      border-radius: 50%;
      border: 3px solid transparent;
      border-top-color: var(--blue-mid);
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #jutsu-label {
      position: absolute;
      top: 16px;
      left: 50%;
      transform: translateX(-50%) scaleX(-1);
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(1.4rem, 4vw, 2.2rem);
      letter-spacing: 10px;
      color: #fff;
      text-shadow: 0 0 30px var(--blue-mid);
      opacity: 0;
      transition: opacity 0.25s ease;
      z-index: 10;
    }
    body.chidori-mode #jutsu-label {
      text-shadow: 0 0 30px var(--lightning);
    }

    #status-bar {
      margin-top: 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.83rem;
      letter-spacing: 2px;
      color: rgba(140, 200, 240, 0.6);
    }
    #dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: rgba(0,200,255,0.3);
    }
    #dot.active {
      background: var(--blue-mid);
      box-shadow: 0 0 12px rgba(0, 200, 255, 0.6), 0 0 4px #fff;
    }
    body.chidori-mode #dot.active {
      background: var(--lightning);
      box-shadow: 0 0 12px rgba(200, 230, 255, 0.6), 0 0 4px #fff;
    }
  </style>
</head>
<body>

  <div id="start-screen">
    <button id="start-btn" class="btn">INITIALIZE CHAKRA</button>
  </div>

  <header>
    <h1 id="main-title">🌀 Rasengan Simulator</h1>
    <p>✋ Open Hand = Rasengan &nbsp;|&nbsp; ✊ Closed Fingers = Chidori</p>
  </header>

  <div id="container">
    <div id="loading-overlay">
      <div class="spinner-ring"></div>
      <span style="font-family: 'Bebas Neue'; letter-spacing: 4px;">Loading Camera...</span>
    </div>
    <div id="jutsu-label">RASENGAN !</div>
    <video id="webcam" autoplay playsinline muted></video>
    <canvas id="output_canvas"></canvas>
  </div>

  <div id="status-bar">
    <div id="dot"></div>
    <span id="status-text">Waiting for hand...</span>
  </div>

  <script>
  (() => {
    const video = document.getElementById('webcam');
    const canvas = document.getElementById('output_canvas');
    const ctx = canvas.getContext('2d');
    const overlay = document.getElementById('loading-overlay');
    const label = document.getElementById('jutsu-label');
    const dot = document.getElementById('dot');
    const statusText = document.getElementById('status-text');
    const startScreen = document.getElementById('start-screen');
    const startBtn = document.getElementById('start-btn');
    const mainTitle = document.getElementById('main-title');

    let rotAngle = 0;
    let jutsuAlpha = 0;
    let targetAlpha = 0;
    let lastX = 0, lastY = 0, lastR = 60;
    let currentJutsu = 'rasengan'; 

    // Audio Variables
    let rasenganSound, chidoriSound;

    // Motion Trail
    const trail = [];

    // Particles for Rasengan
    const PARTICLE_COUNT = 150;
    const particles = Array.from({length: PARTICLE_COUNT}, () => ({
      angle: Math.random() * Math.PI * 2,
      rRatio: 0.12 + Math.random() * 1.0,
      vRatio: 0.2 + Math.random() * 0.55,
      speed: (0.025 + Math.random() * 0.065) * (Math.random() > 0.45 ? 1 : -1.3),
      size: 1.2 + Math.random() * 2.6,
      baseAlpha: 0.45 + Math.random() * 0.55,
      isWhite: Math.random() > 0.4,
      twinkle: Math.random() * Math.PI * 2,
      twinkleS: 0.04 + Math.random() * 0.06
    }));

    function dist3D(a, b) { return Math.sqrt((a.x-b.x)**2 + (a.y-b.y)**2 + (a.z-b.z)**2); }
    function lerp(a, b, t) { return a + (b - a) * t; }

    // Swaps UI Elements automatically
    function setJutsuMode(mode) {
      if (currentJutsu === mode) return; 
      currentJutsu = mode;
      
      if (mode === 'chidori') {
        document.body.classList.add('chidori-mode');
        mainTitle.textContent = '⚡ Chidori Active';
        label.textContent = 'CHIDORI !';
      } else {
        document.body.classList.remove('chidori-mode');
        mainTitle.textContent = '🌀 Rasengan Active';
        label.textContent = 'RASENGAN !';
      }
    }

    function drawRasengan(cx, cy, radius, alpha) {
      ctx.save();
      ctx.globalCompositeOperation = 'screen';

      // Core sphere
      const core = ctx.createRadialGradient(cx, cy, 0, cx, cy, radius * 1.2);
      core.addColorStop(0, `rgba(255,255,255,${alpha})`);
      core.addColorStop(0.4, `rgba(100,220,255,${0.8 * alpha})`);
      core.addColorStop(1, 'rgba(0,50,150,0)');
      ctx.fillStyle = core;
      ctx.beginPath(); ctx.arc(cx, cy, radius * 1.2, 0, Math.PI * 2); ctx.fill();

      // Rings
      const ringDefs = [
        { tilt: 0, a: 0.95, b: 0.15, dir: 1 },
        { tilt: Math.PI/3, a: 0.88, b: 0.22, dir: -1.2 },
        { tilt: Math.PI*2/3, a: 0.80, b: 0.30, dir: 1.4 }
      ];

      ctx.translate(cx, cy);
      ctx.strokeStyle = `rgba(160,235,255,${0.75 * alpha})`;
      ctx.lineWidth = 2;
      for (const ring of ringDefs) {
        ctx.save();
        ctx.rotate(ring.tilt + rotAngle * ring.dir);
        ctx.beginPath(); ctx.ellipse(0, 0, radius * ring.a, radius * ring.b, 0, 0, Math.PI * 2); ctx.stroke();
        ctx.restore();
      }
      ctx.translate(-cx, -cy);

      // Particles
      for (const p of particles) {
        p.angle += p.speed;
        p.twinkle += p.twinkleS;
        const px = cx + Math.cos(p.angle) * (radius * p.rRatio);
        const py = cy + Math.sin(p.angle) * (radius * p.rRatio) * p.vRatio;
        ctx.beginPath(); ctx.arc(px, py, p.size, 0, Math.PI * 2);
        ctx.fillStyle = p.isWhite ? `rgba(240,252,255,${p.baseAlpha * alpha})` : `rgba(60,200,255,${p.baseAlpha * alpha})`;
        ctx.fill();
      }

      ctx.restore();
      rotAngle += 0.04;
    }

    function drawChidori(cx, cy, radius, alpha) {
      ctx.save();
      ctx.globalCompositeOperation = 'screen';

      // Intense White/Cyan Core
      const core = ctx.createRadialGradient(cx, cy, 0, cx, cy, radius * 0.9);
      core.addColorStop(0, `rgba(255,255,255,${alpha})`);
      core.addColorStop(0.3, `rgba(180,240,255,${0.9 * alpha})`);
      core.addColorStop(1, 'rgba(0,100,255,0)');
      ctx.fillStyle = core;
      ctx.beginPath(); ctx.arc(cx, cy, radius * 0.9, 0, Math.PI * 2); ctx.fill();

      // Jagged Lightning Bolts
      const numBolts = Math.floor(Math.random() * 6) + 4; // 4 to 9 bolts per frame
      ctx.lineWidth = 2 + Math.random() * 4;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'miter';

      for (let i = 0; i < numBolts; i++) {
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        let angle = Math.random() * Math.PI * 2;
        let currentX = cx;
        let currentY = cy;
        let boltLength = radius * (1.2 + Math.random() * 1.5); 
        let segments = 4 + Math.floor(Math.random() * 5);
        let segmentLength = boltLength / segments;

        for (let j = 0; j < segments; j++) {
          // Add erratic zig-zag angles
          let offsetAngle = angle + (Math.random() - 0.5) * 1.8;
          currentX += Math.cos(offsetAngle) * segmentLength;
          currentY += Math.sin(offsetAngle) * segmentLength;
          ctx.lineTo(currentX, currentY);
        }
        
        ctx.strokeStyle = Math.random() > 0.4 ? `rgba(255,255,255,${alpha})` : `rgba(150,220,255,${alpha})`;
        ctx.shadowColor = 'rgba(100,200,255,1)';
        ctx.shadowBlur = 15;
        ctx.stroke();
      }

      ctx.restore();
    }

    function onResults(results) {
      const W = video.videoWidth || 640;
      const H = video.videoHeight || 480;
      if (canvas.width !== W) canvas.width = W;
      if (canvas.height !== H) canvas.height = H;
      ctx.clearRect(0, 0, W, H);

      if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
        const lm = results.multiHandLandmarks[0];
        
        // 1. Measure Palm Size (Wrist to Knuckle) for stable scaling
        const palmSize = dist3D(lm[0], lm[9]);

        // 2. Measure Finger Spread (Index Tip to Pinky Tip)
        const spread = dist3D(lm[8], lm[20]);

        // 3. Ratio determines hand shape (works far away or up close)
        const spreadRatio = spread / palmSize;

        // Auto-detect! If fingers are close, Chidori. If spread wide, Rasengan.
        // We use a small gap (1.1 to 1.3) so it doesn't flicker wildly in the middle.
        if (spreadRatio < 1.1) {
          setJutsuMode('chidori');
        } else if (spreadRatio > 1.3) {
          setJutsuMode('rasengan');
        }

        // Activate Jutsu if hand is clearly visible (palmSize > 0.05)
        if (palmSize > 0.05) {
          targetAlpha = 1;
          
          // Position jutsu in center of hand
          lastX = lerp(lastX, ((lm[9].x + lm[0].x) / 2) * W, 0.35);
          lastY = lerp(lastY, ((lm[9].y + lm[0].y) / 2) * H, 0.35);
          
          // Scale visually based on hand distance
          lastR = lerp(lastR, palmSize * W * 2.2, 0.3);

          label.style.opacity = targetAlpha.toFixed(2);
          dot.classList.add('active');
          statusText.classList.add('active');
          statusText.textContent = currentJutsu === 'rasengan' ? 'RASENGAN DETECTED ⚡' : 'CHIDORI DETECTED ⚡';
        } else {
          targetAlpha = 0;
          label.style.opacity = '0';
          dot.classList.remove('active');
          statusText.classList.remove('active');
          statusText.textContent = 'Hand too far away ✋';
        }
      } else {
        targetAlpha = 0;
        label.style.opacity = '0';
        dot.classList.remove('active');
        statusText.classList.remove('active');
        statusText.textContent = 'Waiting for hand...';
      }

      // Smooth out the animation
      jutsuAlpha += (targetAlpha - jutsuAlpha) * 0.14;

      // UPDATE VOLUME based on active jutsu
      const activeVolume = Math.min(Math.max(jutsuAlpha, 0), 1);
      if (currentJutsu === 'rasengan' && rasenganSound) {
        rasenganSound.volume = activeVolume;
        if (chidoriSound) chidoriSound.volume = 0;
      } else if (currentJutsu === 'chidori' && chidoriSound) {
        chidoriSound.volume = activeVolume;
        if (rasenganSound) rasenganSound.volume = 0;
      }

      if (jutsuAlpha > 0.005) {
        if (currentJutsu === 'rasengan') {
          // Draw Motion Trail Behind for Rasengan
          trail.push({ x: lastX, y: lastY, r: lastR, age: 0 });
          if (trail.length > 8) trail.shift();
          trail.forEach((t) => {
            t.age++;
            const trailAlpha = jutsuAlpha * (1 - t.age / 8) * 0.3;
            drawRasengan(t.x, t.y, t.r * 0.8, trailAlpha);
          });
          // Draw Main Rasengan
          drawRasengan(lastX, lastY, lastR, jutsuAlpha);
        } else {
          // Chidori doesn't need a smooth trail, it's chaotic
          trail.length = 0;
          drawChidori(lastX, lastY, lastR, jutsuAlpha);
        }
      } else {
        trail.length = 0; // Clear trail when off
      }
    }

    // Main Init
    startBtn.addEventListener('click', () => {
      startScreen.style.opacity = '0';
      setTimeout(() => startScreen.style.display = 'none', 500);

      // Load both audio files
      rasenganSound = new Audio('./rasengan.mp3'); 
      rasenganSound.loop = true; 
      rasenganSound.volume = 0;  
      rasenganSound.play().catch(err => console.log("Rasengan audio play failed:", err));

      chidoriSound = new Audio('./chidori.mp3'); 
      chidoriSound.loop = true; 
      chidoriSound.volume = 0;  
      chidoriSound.play().catch(err => console.log("Chidori audio play failed:", err));
      
      // Init Camera & AI
      const hands = new Hands({ locateFile: file => `https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4/${file}` });
      hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.7, minTrackingConfidence: 0.6 });
      hands.onResults(onResults);

      const camera = new Camera(video, { onFrame: async () => { await hands.send({ image: video }); }, width: 640, height: 480 });
      camera.start()
        .then(() => {
          overlay.classList.add('hidden');
          setTimeout(() => overlay.style.display = 'none', 600);
        })
        .catch(err => alert('Camera error: ' + err.message));
    });

  })();
  </script>
</body>
</html>
