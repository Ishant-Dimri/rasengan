<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rasengan Simulator 🌀</title>

  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils@0.3/drawing_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4/hands.js" crossorigin="anonymous"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;600&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --blue-core:   #a8edff;
      --blue-mid:    #00c8ff;
      --blue-deep:   #0050c8;
      --bg:          #04080f;
      --ui-glow:     rgba(0, 200, 255, 0.6);
    }

    body {
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      font-family: 'Rajdhani', sans-serif;
      color: #cce9ff;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 30%, rgba(0, 60, 120, 0.35) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 70%, rgba(0, 30, 80, 0.3) 0%, transparent 55%);
      pointer-events: none;
    }

    header {
      text-align: center;
      margin-bottom: 18px;
      position: relative;
      z-index: 5;
    }
    header h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2rem, 5vw, 3.2rem);
      letter-spacing: 8px;
      background: linear-gradient(135deg, #ffffff 30%, var(--blue-mid) 70%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 0 18px rgba(0,200,255,0.7));
    }

    /* Start Button Overlay */
    #start-screen {
      position: fixed;
      inset: 0;
      background: rgba(4, 8, 15, 0.95);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 50;
      transition: opacity 0.5s;
    }
    #start-btn {
      padding: 15px 40px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.5rem;
      letter-spacing: 4px;
      color: #fff;
      background: transparent;
      border: 2px solid var(--blue-mid);
      border-radius: 8px;
      cursor: pointer;
      box-shadow: 0 0 20px rgba(0, 200, 255, 0.3);
      transition: 0.3s;
    }
    #start-btn:hover {
      background: rgba(0, 200, 255, 0.2);
      box-shadow: 0 0 30px rgba(0, 200, 255, 0.6);
    }

    #container {
      position: relative;
      width: min(640px, 98vw);
      aspect-ratio: 4 / 3;
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 0 50px rgba(0,130,255,0.25);
    }

    video, #output_canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      transform: scaleX(-1);
    }
    video { object-fit: cover; }

    #loading-overlay {
      position: absolute;
      inset: 0;
      background: rgba(4, 8, 15, 0.92);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 30;
      gap: 20px;
      transition: opacity 0.5s;
    }
    .spinner-ring {
      width: 60px; height: 60px;
      border-radius: 50%;
      border: 3px solid transparent;
      border-top-color: var(--blue-mid);
      border-right-color: rgba(0,200,255,0.35);
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #rasengan-label {
      position: absolute;
      top: 16px;
      left: 50%;
      transform: translateX(-50%) scaleX(-1);
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(1.4rem, 4vw, 2.2rem);
      letter-spacing: 10px;
      color: #fff;
      text-shadow: 0 0 30px var(--blue-mid);
      opacity: 0;
      transition: opacity 0.25s ease;
      z-index: 10;
    }

    #status-bar {
      margin-top: 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.83rem;
      letter-spacing: 2px;
      color: rgba(140, 200, 240, 0.6);
    }
    #dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: rgba(0,200,255,0.3);
    }
    #dot.active {
      background: var(--blue-mid);
      box-shadow: 0 0 12px var(--ui-glow), 0 0 4px #fff;
    }
    #status-text.active { color: var(--blue-mid); }
  </style>
</head>
<body>

  <div id="start-screen">
    <button id="start-btn">INITIALIZE CHAKRA</button>
  </div>

  <header>
    <h1>🌀 Rasengan Simulator</h1>
    <p>Naruto Hand Gesture — Powered by MediaPipe</p>
  </header>

  <div id="container">
    <div id="loading-overlay">
      <div class="spinner-ring"></div>
      <span style="font-family: 'Bebas Neue'; letter-spacing: 4px;">Loading Camera...</span>
    </div>
    <div id="rasengan-label">RASENGAN !</div>
    <video id="webcam" autoplay playsinline muted></video>
    <canvas id="output_canvas"></canvas>
  </div>

  <div id="status-bar">
    <div id="dot"></div>
    <span id="status-text">Waiting for hand...</span>
  </div>

  <script>
  (() => {
    const video = document.getElementById('webcam');
    const canvas = document.getElementById('output_canvas');
    const ctx = canvas.getContext('2d');
    const overlay = document.getElementById('loading-overlay');
    const label = document.getElementById('rasengan-label');
    const dot = document.getElementById('dot');
    const statusText = document.getElementById('status-text');
    const startScreen = document.getElementById('start-screen');
    const startBtn = document.getElementById('start-btn');

    let rotAngle = 0;
    let rasenganAlpha = 0;
    let targetAlpha = 0;
    let lastX = 0, lastY = 0, lastR = 60;
    let prevSpan = 0;

    // Audio Variables
    let rasenganSound;

    // Motion Trail
    const trail = [];

    // Particles
    const PARTICLE_COUNT = 150;
    const particles = Array.from({length: PARTICLE_COUNT}, () => ({
      angle: Math.random() * Math.PI * 2,
      rRatio: 0.12 + Math.random() * 1.0,
      vRatio: 0.2 + Math.random() * 0.55,
      speed: (0.025 + Math.random() * 0.065) * (Math.random() > 0.45 ? 1 : -1.3),
      size: 1.2 + Math.random() * 2.6,
      baseAlpha: 0.45 + Math.random() * 0.55,
      isWhite: Math.random() > 0.4,
      twinkle: Math.random() * Math.PI * 2,
      twinkleS: 0.04 + Math.random() * 0.06
    }));

    function dist3D(a, b) { return Math.sqrt((a.x-b.x)**2 + (a.y-b.y)**2 + (a.z-b.z)**2); }
    function lerp(a, b, t) { return a + (b - a) * t; }

    function drawRasengan(cx, cy, radius, alpha) {
      if (alpha < 0.005) return;
      ctx.save();
      ctx.globalCompositeOperation = 'screen';

      // Core sphere
      const core = ctx.createRadialGradient(cx, cy, 0, cx, cy, radius * 1.2);
      core.addColorStop(0, `rgba(255,255,255,${alpha})`);
      core.addColorStop(0.4, `rgba(100,220,255,${0.8 * alpha})`);
      core.addColorStop(1, 'rgba(0,50,150,0)');
      ctx.fillStyle = core;
      ctx.beginPath(); ctx.arc(cx, cy, radius * 1.2, 0, Math.PI * 2); ctx.fill();

      // Rings
      const ringDefs = [
        { tilt: 0, a: 0.95, b: 0.15, dir: 1 },
        { tilt: Math.PI/3, a: 0.88, b: 0.22, dir: -1.2 },
        { tilt: Math.PI*2/3, a: 0.80, b: 0.30, dir: 1.4 }
      ];

      ctx.translate(cx, cy);
      ctx.strokeStyle = `rgba(160,235,255,${0.75 * alpha})`;
      ctx.lineWidth = 2;
      for (const ring of ringDefs) {
        ctx.save();
        ctx.rotate(ring.tilt + rotAngle * ring.dir);
        ctx.beginPath(); ctx.ellipse(0, 0, radius * ring.a, radius * ring.b, 0, 0, Math.PI * 2); ctx.stroke();
        ctx.restore();
      }
      ctx.translate(-cx, -cy);

      // Particles
      for (const p of particles) {
        p.angle += p.speed;
        p.twinkle += p.twinkleS;
        const px = cx + Math.cos(p.angle) * (radius * p.rRatio);
        const py = cy + Math.sin(p.angle) * (radius * p.rRatio) * p.vRatio;
        ctx.beginPath(); ctx.arc(px, py, p.size, 0, Math.PI * 2);
        ctx.fillStyle = p.isWhite ? `rgba(240,252,255,${p.baseAlpha * alpha})` : `rgba(60,200,255,${p.baseAlpha * alpha})`;
        ctx.fill();
      }

      ctx.restore();
      rotAngle += 0.04;
    }

    function onResults(results) {
      const W = video.videoWidth || 640;
      const H = video.videoHeight || 480;
      if (canvas.width !== W) canvas.width = W;
      if (canvas.height !== H) canvas.height = H;
      ctx.clearRect(0, 0, W, H);

     // Dynamically update MP3 volume based on Rasengan size/alpha
      if (rasenganSound) {
        // Ensure volume stays strictly between 0.0 and 1.0 to prevent errors
        rasenganSound.volume = Math.min(Math.max(rasenganAlpha, 0), 1);
      }
        const spanFull = Math.max(dist3D(lm[4], lm[20]), dist3D(lm[4], lm[8]));
        prevSpan = lerp(prevSpan, spanFull, 0.35);

        if (prevSpan > 0.22) {
          targetAlpha = Math.min(1, (prevSpan - 0.22) / 0.18);
          lastX = lerp(lastX, ((lm[9].x + lm[0].x) / 2) * W, 0.35);
          lastY = lerp(lastY, ((lm[9].y + lm[0].y) / 2) * H, 0.35);
          lastR = lerp(lastR, prevSpan * W * 0.52, 0.3);

          label.style.opacity = targetAlpha.toFixed(2);
          dot.classList.add('active');
          statusText.classList.add('active');
          statusText.textContent = 'RASENGAN ACTIVE ⚡';
        } else {
          targetAlpha = 0;
          label.style.opacity = '0';
          dot.classList.remove('active');
          statusText.classList.remove('active');
          statusText.textContent = 'Hand detected — open wider ✋';
        }
      } else {
        targetAlpha = 0;
        label.style.opacity = '0';
        dot.classList.remove('active');
        statusText.classList.remove('active');
        statusText.textContent = 'Waiting for hand...';
      }

      rasenganAlpha += (targetAlpha - rasenganAlpha) * 0.14;

      // Ensure Audio Updates dynamically with the alpha
      if (audioCtx && gain && osc) {
        gain.gain.setTargetAtTime(rasenganAlpha * 0.3, audioCtx.currentTime, 0.1);
        osc.frequency.setTargetAtTime(180 + rasenganAlpha * 200, audioCtx.currentTime, 0.1);
      }

      if (rasenganAlpha > 0.005) {
        // Draw Motion Trail Behind
        trail.push({ x: lastX, y: lastY, r: lastR, age: 0 });
        if (trail.length > 8) trail.shift();
        trail.forEach((t) => {
          t.age++;
          const trailAlpha = rasenganAlpha * (1 - t.age / 8) * 0.3;
          drawRasengan(t.x, t.y, t.r * 0.8, trailAlpha);
        });

        // Draw Main Rasengan
        drawRasengan(lastX, lastY, lastR, rasenganAlpha);
      } else {
        trail.length = 0; // Clear trail when off
      }
    }

    // Main Init
    startBtn.addEventListener('click', () => {
      startScreen.style.opacity = '0';
      setTimeout(() => startScreen.style.display = 'none', 500);

      // 1. Init Audio safely behind interaction
// 1. Init Audio safely behind interaction
      // REPLACE 'your-sound.mp3' WITH your actual file name
      rasenganSound = new Audio('./rasengan.mp3'); 
      rasenganSound.loop = true; // Loops the sound infinitely
      rasenganSound.volume = 0;  // Start quiet
      rasenganSound.play().catch(err => console.log("Audio play failed:", err));
      // 2. Init Camera & AI
      const hands = new Hands({ locateFile: file => `https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4/${file}` });
      hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.7, minTrackingConfidence: 0.6 });
      hands.onResults(onResults);

      const camera = new Camera(video, { onFrame: async () => { await hands.send({ image: video }); }, width: 640, height: 480 });
      camera.start()
        .then(() => {
          overlay.classList.add('hidden');
          setTimeout(() => overlay.style.display = 'none', 600);
        })
        .catch(err => alert('Camera error: ' + err.message));
    });

  })();
  </script>
</body>
</html>
